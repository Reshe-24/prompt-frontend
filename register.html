<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Prompt Management System</title>
    <link rel="stylesheet" href="css/register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="register-container">
      <div class="register-card">
        <div class="register-header">
          <h2>👤Create Account</h2>
          <p>Register a new account to start managing prompts</p>
        </div>

        <form id="register-form">
          <div class="error-alert" id="error-alert" style="display: none"></div>
          <div
            class="success-alert"
            id="success-alert"
            style="display: none"
          ></div>

          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Enter username"
            />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              required
              placeholder="name@example.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password </label>
            <input
              type="password"
              id="confirm-password"
              required
              placeholder="••••••••"
            />
          </div>

          <div class="form-group">
            <label for="role">Assign Role</label>
            <select id="role">
              <option value="PROMPT_COLLECTOR">Prompt Collector</option>
              <option value="PROMPT_ENGINEER">Prompt Engineer</option>
              <option value="TEAM_LEAD">Team Lead (Admin)</option>
            </select>
          </div>

          <button type="submit" class="btn-submit" id="btn-submit">
            Sign Up
          </button>
        </form>

        <div class="register-footer">
          <p>Already have an account? <a href="index.html">Sign in here</a></p>
        </div>
      </div>
    </div>

    <!-- Core authentication and API logic -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <!-- Page specific logic -->
    <script src="js/register.js"></script>
  </body>
</html>
